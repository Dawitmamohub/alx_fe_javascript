<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Quote Generator with Sync</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Dynamic Quote Generator with Sync</h1>
  
  <div id="syncStatus" class="sync-status">Initializing...</div>
  
  <div class="data-actions">
    <button id="exportQuotes"><i class="fas fa-file-export"></i> Export Quotes</button>
    <button id="importQuotes"><i class="fas fa-file-import"></i> Import Quotes</button>
    <button id="manualSync"><i class="fas fa-sync-alt"></i> Sync Now</button>
    <input type="file" id="importFile" class="hidden" accept=".json" />
  </div>
  
  <div class="filter-section">
    <h3>Filter by Category:</h3>
    <select id="categoryFilter">
      <option value="all">All Categories</option>
    </select>
    <span id="activeFilter" class="category-tag hidden"></span>
  </div>
  
  <div id="quoteDisplay">
    <p class="quote-text">Click "Show New Quote" to see your first quote!</p>
    <p class="quote-category"></p>
  </div>
  
  <div class="button-group">
    <button id="newQuote"><i class="fas fa-random"></i> Show New Quote</button>
    <button id="showAddForm"><i class="fas fa-plus"></i> Add New Quote</button>
  </div>
  
  <div id="addQuoteForm" class="form-container hidden">
    <h3>Add a New Quote</h3>
    <div>
      <input id="newQuoteText" type="text" placeholder="Enter a new quote" />
    </div>
    <div>
      <input id="newQuoteCategory" type="text" placeholder="Enter quote category" />
    </div>
    <button id="addQuoteBtn"><i class="fas fa-save"></i> Add Quote</button>
  </div>
  
  <div id="conflictResolution" class="conflict-resolution hidden">
    <h3><i class="fas fa-exclamation-triangle"></i> Conflict Resolution</h3>
    <div id="conflictItems"></div>
    <button id="resolveConflicts"><i class="fas fa-check-circle"></i> Accept Resolutions</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
